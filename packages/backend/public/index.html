<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Navi — drop docs while on the phone</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #fafafa; color: #1a1a1a; }
    .wrap { max-width: 760px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 1rem 1.2rem; background: #fff; border-bottom: 1px solid #e6e6e6; display: flex; align-items: center; gap: 0.7rem; }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    .phone { font-family: ui-monospace, monospace; font-size: 0.9rem; padding: 0.3rem 0.6rem; background: #111; color: #fff; border-radius: 6px; }
    .pulse { width: 8px; height: 8px; background: #093; border-radius: 50%; animation: p 1.4s infinite; display: inline-block; }
    @keyframes p { 0%,100%{opacity:1} 50%{opacity:0.3} }
    main { flex: 1; overflow-y: auto; padding: 1rem 1.2rem; }
    .msg { margin: 0.7rem 0; display: flex; gap: 0.5rem; max-width: 90%; }
    .msg.bot { margin-right: auto; }
    .msg.you { margin-left: auto; flex-direction: row-reverse; }
    .bubble { padding: 0.6rem 0.85rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; white-space: pre-wrap; }
    .msg.bot .bubble { background: #fff; border: 1px solid #e6e6e6; }
    .msg.you .bubble { background: #111; color: #fff; }
    .avatar { width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%; background: #4ade80; color: #0f1117; font-weight: 700; display: grid; place-items: center; font-size: 0.85rem; }
    .msg.you .avatar { background: #111; color: #fff; }
    .meta { font-size: 0.7rem; color: #999; margin-top: 0.2rem; }
    .quick { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .quick button { font-size: 0.78rem; padding: 0.3rem 0.6rem; background: #f0f0f0; border: 1px solid #ddd; border-radius: 999px; cursor: pointer; }
    .quick button:hover { background: #e8e8e8; }
    footer { padding: 0.8rem 1.2rem; background: #fff; border-top: 1px solid #e6e6e6; }
    .input-row { display: flex; gap: 0.5rem; align-items: end; }
    textarea { flex: 1; resize: none; padding: 0.65rem 0.8rem; border: 1px solid #ccc; border-radius: 10px; font: inherit; font-size: 0.95rem; max-height: 120px; }
    button.send { padding: 0.65rem 1.2rem; border: 0; border-radius: 10px; background: #111; color: #fff; cursor: pointer; font-weight: 500; }
    button.send:disabled { opacity: 0.4; cursor: not-allowed; }
    .drop-hint { color: #888; font-size: 0.78rem; margin-top: 0.4rem; }
    .drag-over { background: #f0fdf4 !important; border-color: #4ade80 !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="pulse"></span>
      <h1>Navi · drop docs and connections</h1>
      <span class="phone">📞 +1 (650) 448-0770</span>
    </header>
    <main id="thread"></main>
    <footer>
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Type, paste a URL, or drop files…"></textarea>
        <button class="send" id="send" onclick="onSend()">Send</button>
      </div>
      <div class="drop-hint" id="drop-hint">drag PDFs / docs anywhere on the page · paste connection strings · I'll route them</div>
    </footer>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    let sessionId = null;
    let companyName = null;

    function bubble(who, text, meta = "") {
      const t = $("thread");
      const div = document.createElement("div");
      div.className = "msg " + who;
      const avatar = who === "you" ? "U" : "N";
      div.innerHTML = `<div class="avatar">${avatar}</div><div><div class="bubble"></div>${meta ? `<div class="meta">${meta}</div>` : ""}</div>`;
      div.querySelector(".bubble").textContent = text;
      t.appendChild(div);
      t.scrollTop = t.scrollHeight;
      return div;
    }
    function quick(opts) {
      const t = $("thread");
      const wrap = document.createElement("div");
      wrap.className = "msg bot";
      wrap.innerHTML = `<div class="avatar">N</div><div><div class="bubble"></div><div class="quick"></div></div>`;
      const q = wrap.querySelector(".quick");
      opts.forEach((o) => {
        const b = document.createElement("button");
        b.textContent = o.label;
        b.onclick = () => { o.run(); wrap.querySelector(".quick").remove(); };
        q.appendChild(b);
      });
      wrap.querySelector(".bubble").textContent = "Quick actions:";
      t.appendChild(wrap);
      t.scrollTop = t.scrollHeight;
    }

    async function startSession(name, url) {
      const res = await fetch("/onboard/start", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, url }) });
      const j = await res.json();
      sessionId = j.session_id;
      companyName = name;
      bubble("bot", `Got it — session ${sessionId.slice(0,8)} for ${name}. Open your operator dashboard while we work:`, `${location.origin}/op?id=${sessionId}`);
      return j;
    }

    async function scrapeUrl(url) {
      bubble("bot", `Scraping ${url} via TinyFish + Nexla in parallel…`);
      const res = await fetch(`/onboard/${sessionId}/scrape`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ url, goal: "extract enterprise capabilities" }) });
      const j = await res.json();
      const draft = j?.tinyfish_draft || j;
      const machines = (draft.machines || []).map((m) => `• ${m.name || m.kind || JSON.stringify(m)}`).join("\n");
      bubble("bot", `Pulled:\n${machines || JSON.stringify(j).slice(0,400)}\n\nWant to add SOPs or connect a database next?`);
    }

    async function ingestDocs(urls) {
      bubble("bot", `Ingesting ${urls.length} doc(s) into Ghost forked verifier DB…`);
      const res = await fetch(`/onboard/${sessionId}/ingest-docs`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ doc_urls: urls }) });
      const j = await res.json();
      bubble("bot", `Indexed ${j.indexed_docs ?? urls.length} docs · pgvectorscale + BM25.`);
    }

    async function buildAgent() {
      bubble("bot", `Building your PCC agent — fanning out 7 sponsor integrations in parallel. ~30s.`);
      const res = await fetch(`/onboard/${sessionId}/build-agent`, { method: "POST" });
      const j = await res.json();
      bubble("bot",
        `Done. Your agent is live.\n\n` +
        `Operator dashboard: ${location.origin}/op?id=${sessionId}\n` +
        `Guild: ${j.agent?.url ?? "—"}\n` +
        `agentic.market: ${j.agent?.marketplace_url ?? "—"}\n` +
        `cited.md: ${j.cited?.url ?? "—"}\n` +
        `InsForge: ${j.backend?.project_url ?? "—"}`
      );
    }

    function looksLikeUrl(t) {
      return /^https?:\/\//i.test(t.trim());
    }
    function looksLikeConnString(t) {
      return /^(postgres|mysql|mongodb|redis|s3|sharepoint):\/\//i.test(t.trim()) || /sharepoint\.com|salesforce\.com|snowflakecomputing\.com/i.test(t);
    }

    async function onSend() {
      const txt = $("input").value.trim();
      if (!txt) return;
      $("input").value = "";
      bubble("you", txt);

      // Step 1: no session yet — first message is the company name
      if (!sessionId) {
        const m = txt.match(/^(.+?)\s+(?:at|@|—|-)\s+(https?:\/\/\S+)/i);
        let name = txt, url = null;
        if (m) { name = m[1]; url = m[2]; }
        await startSession(name, url);
        if (url) {
          await scrapeUrl(url);
        } else {
          bubble("bot", "Drop your website URL next, or paste a connection string for your ERP / CMMS / SharePoint, or attach an SOP doc.");
        }
        return;
      }

      // Step 2+: route by content
      const urls = txt.split(/\s+/).filter(looksLikeUrl);
      if (urls.length && urls.some(looksLikeConnString)) {
        bubble("bot", "Connection string detected — creating Nexla source…");
        await scrapeUrl(urls[0]);
        return;
      }
      if (urls.length === 1 && /\.pdf|\.docx|\.html?$|drive\.google\.com|sharepoint\.com/i.test(urls[0])) {
        await ingestDocs(urls);
        return;
      }
      if (urls.length === 1) {
        await scrapeUrl(urls[0]);
        return;
      }
      if (urls.length > 1) {
        await ingestDocs(urls);
        return;
      }

      // Plain text — show quick actions
      if (/build|done|deploy|finish|go live|ship/i.test(txt)) {
        await buildAgent();
        return;
      }

      bubble("bot", `Noted. When you're ready I can build your agent — say "build" or paste any remaining docs/URLs.`);
      quick([
        { label: "⚡ Build my PCC agent", run: () => buildAgent() },
        { label: "Open operator dashboard", run: () => window.open(`/op?id=${sessionId}`, "_blank") }
      ]);
    }

    $("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSend(); }
    });

    // Drag-and-drop docs (file names become document URLs by convention)
    document.body.addEventListener("dragover", (e) => { e.preventDefault(); document.body.classList.add("drag-over"); });
    document.body.addEventListener("dragleave", () => document.body.classList.remove("drag-over"));
    document.body.addEventListener("drop", (e) => {
      e.preventDefault();
      document.body.classList.remove("drag-over");
      const files = Array.from(e.dataTransfer.files);
      if (!files.length) return;
      bubble("you", files.map((f) => `📄 ${f.name}`).join("\n"));
      if (!sessionId) { bubble("bot", "Tell me your company name first, then drop docs."); return; }
      // For now we treat dropped filenames as URLs (best-effort) — real upload would PUT to InsForge storage
      ingestDocs(files.map((f) => `local://${f.name}`));
    });

    // First contact
    bubble("bot", "Hi — I'm Navi. While you're on the phone with the voice agent, drop docs and connections here. What's your company name? (e.g. \"Oakland Titanium Mills at https://oakland-titanium-mills.example\")");
  </script>
</body>
</html>
