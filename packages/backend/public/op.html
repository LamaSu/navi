<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Operator agent — accepting jobs</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #0f1117; color: #e6edf3; }
    .wrap { max-width: 820px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 1.2rem 1.4rem; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    header .name { font-weight: 600; font-size: 1.15rem; letter-spacing: -0.02em; }
    header .sub { color: #8b949e; font-size: 0.85rem; }
    .pill { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.25rem 0.7rem; background: #093; color: #fff; border-radius: 999px; font-size: 0.82rem; font-weight: 500; }
    .pill::before { content: ""; width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: p 1.4s infinite; }
    @keyframes p { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .caps { padding: 1rem 1.4rem; border-bottom: 1px solid #30363d; }
    .caps h2 { color: #8b949e; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 0.6rem; font-weight: 500; }
    .badge { display: inline-block; padding: 0.3rem 0.65rem; background: #1f6feb; color: #fff; border-radius: 999px; font-size: 0.82rem; margin: 0.15rem; }
    .badge.cert { background: #a371f7; }
    .badge.mat { background: #f59e0b; color: #1a1a1a; }
    main { flex: 1; padding: 1rem 1.4rem; overflow-y: auto; }
    .msg { margin: 0.7rem 0; display: flex; gap: 0.5rem; max-width: 92%; }
    .msg.agent { margin-right: auto; }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .avatar { width: 30px; height: 30px; flex-shrink: 0; border-radius: 50%; background: #4ade80; color: #0f1117; font-weight: 700; display: grid; place-items: center; font-size: 0.78rem; }
    .msg.user .avatar { background: #1f6feb; color: #fff; }
    .bubble { padding: 0.6rem 0.85rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.45; white-space: pre-wrap; }
    .msg.agent .bubble { background: #161b22; border: 1px solid #30363d; }
    .msg.user .bubble { background: #1f6feb; }
    footer { padding: 0.9rem 1.4rem; background: #161b22; border-top: 1px solid #30363d; }
    .field-row { display: flex; gap: 0.5rem; }
    input, select { padding: 0.55rem 0.7rem; background: #0a0d12; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; font: inherit; font-size: 0.95rem; }
    input:focus, select:focus { outline: 0; border-color: #58a6ff; }
    input { flex: 1; }
    button { padding: 0.55rem 1rem; background: #4ade80; color: #0f1117; border: 0; border-radius: 8px; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.85; }
    .small { font-size: 0.78rem; color: #8b949e; }
    .quote { background: linear-gradient(135deg,#093, #4ade80); color: #0f1117; padding: 0.85rem 1rem; border-radius: 10px; font-weight: 500; }
    code { background: #0a0d12; padding: 0.05rem 0.3rem; border-radius: 3px; font-size: 0.85rem; }
    .footer-info { padding: 0.7rem 1.4rem; color: #6e7681; font-size: 0.78rem; border-top: 1px solid #30363d; text-align: center; }
    .footer-info a { color: #79c0ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="name" id="opName">Operator agent</div>
        <div class="sub">Physical Capability Cloud · session <code id="opId">—</code></div>
      </div>
      <span class="pill">ONLINE — accepting jobs</span>
    </header>

    <div class="caps">
      <h2>Capabilities</h2>
      <div id="caps"></div>
      <h2 style="margin-top: 0.8rem;">Materials</h2>
      <div id="mats"></div>
      <h2 style="margin-top: 0.8rem;">Certifications</h2>
      <div id="certs"></div>
    </div>

    <main id="thread"></main>

    <footer>
      <div id="form-area"></div>
    </footer>
    <div class="footer-info">
      x402 endpoint: <code id="x402">—</code> · CDP wallet: <code id="wallet">0xmock…</code> · cited.md: <a id="cited" href="#" target="_blank">profile</a> · agentic.market: <a id="market" href="#" target="_blank">listing</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id") || "demo";
    const $ = (q) => document.getElementById(q);
    let job = {};
    let stage = 0;

    function bubble(who, text) {
      const t = $("thread");
      const div = document.createElement("div");
      div.className = "msg " + who;
      const avatar = who === "user" ? "U" : "A";
      div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble"></div>`;
      div.querySelector(".bubble").textContent = text;
      t.appendChild(div);
      t.scrollTop = t.scrollHeight;
      return div;
    }
    function quote(html) {
      const t = $("thread");
      const div = document.createElement("div");
      div.className = "msg agent";
      div.innerHTML = `<div class="avatar">A</div><div class="quote"></div>`;
      div.querySelector(".quote").innerHTML = html;
      t.appendChild(div);
      t.scrollTop = t.scrollHeight;
    }

    async function poll() {
      try {
        const res = await fetch(`/onboard/${id}/status`);
        if (!res.ok) return;
        const s = await res.json();
        $("opName").textContent = s.name ? `${s.name} — operator agent` : "Operator agent";
        $("opId").textContent = (s.id || id).slice(0, 8);
        const x402 = `${location.origin}/jobs?op=${s.id || id}`;
        $("x402").textContent = x402;
        const w = s.extras?.wallet?.address || s.extras?.cdp?.address || ("0xmock_" + (s.id || id).slice(0, 10));
        $("wallet").textContent = w;
        const market = s.agent?.marketplace_url || s.extras?.agent?.marketplace_url;
        if (market) { $("market").href = market; $("market").textContent = market; }
        const cited = s.cited?.url || s.extras?.cited?.url;
        if (cited) { $("cited").href = cited; }
      } catch {}
    }

    function renderCaps() {
      // Live data: machines + materials + certs from /onboard/:id/live-data
      fetch(`/onboard/${id}/live-data`).then((r) => r.ok ? r.json() : null).then((d) => {
        if (!d) return;
        const machineLabels = (d.machines || []).map((m) => m.name || m.kind || m).slice(0, 8);
        const caps = machineLabels.length ? machineLabels : ["5-axis titanium milling", "CMM inspection"];
        $("caps").innerHTML = caps.map((c) => `<span class="badge">${c}</span>`).join("");
        $("mats").innerHTML = (d.materials || []).map((m) => `<span class="badge mat">${m}</span>`).join("");
        $("certs").innerHTML = (d.certifications || []).map((c) => `<span class="badge cert">${c}</span>`).join("");
        // Header subtitle gets a live-data signal
        const sub = document.querySelector("header .sub");
        if (sub && d.data_source_type) {
          sub.innerHTML = `Physical Capability Cloud · session <code>${(d.session_id||id).slice(0,8)}</code> · live data via Nexla <code>${d.data_source_type}</code> source`;
        }
      });
    }

    function nextField() {
      const fields = [
        { key: "material", q: "What material? (e.g. Ti-6Al-4V)", type: "select", opts: ["Ti-6Al-4V","Ti-6Al-4V ELI","Inconel 625","Inconel 718","Other"] },
        { key: "dims", q: "Part envelope? Length × width × height in inches.", type: "text", placeholder: "4 × 4 × 6" },
        { key: "qty", q: "How many?", type: "text", placeholder: "12" },
        { key: "deadline", q: "When do you need it?", type: "text", placeholder: "by Tuesday" },
        { key: "tolerance", q: "Tolerance class?", type: "select", opts: ["±0.005\" general","±0.001\" precision","±0.0005\" tight","aerospace AS9100"] }
      ];
      if (stage >= fields.length) {
        finalize();
        return;
      }
      const f = fields[stage];
      bubble("agent", f.q);
      const a = $("form-area");
      if (f.type === "select") {
        a.innerHTML = `<div class="field-row"><select id="answer">${f.opts.map((o) => `<option>${o}</option>`).join("")}</select><button onclick="submitAnswer()">Send</button></div>`;
      } else {
        a.innerHTML = `<div class="field-row"><input id="answer" type="text" placeholder="${f.placeholder}" /><button onclick="submitAnswer()">Send</button></div>`;
      }
      $("answer").focus();
      $("answer").addEventListener("keydown", (e) => { if (e.key === "Enter") submitAnswer(); });
    }

    window.submitAnswer = function () {
      const v = $("answer").value.trim();
      if (!v) return;
      const fieldKeys = ["material","dims","qty","deadline","tolerance"];
      job[fieldKeys[stage]] = v;
      bubble("user", v);
      stage++;
      $("form-area").innerHTML = "";
      setTimeout(nextField, 250);
    };

    function finalize() {
      bubble("agent", "Got it. Checking capacity, materials, and lead time against current schedule…");
      setTimeout(() => {
        // mock a price: dims size factor + qty + tolerance multiplier + material multiplier
        const qty = parseInt(job.qty) || 1;
        const tol = job.tolerance.includes("aerospace") ? 1.6 : job.tolerance.includes("tight") ? 1.4 : job.tolerance.includes("precision") ? 1.2 : 1;
        const mat = job.material.includes("Inconel") ? 1.5 : 1;
        const unit = Math.round(220 * tol * mat);
        const total = unit * qty;
        const eta = job.deadline.toLowerCase().includes("tuesday") || job.deadline.toLowerCase().includes("rush") ? "48 hours" : "5–7 business days";
        quote(`<strong>QUOTE</strong><br/>` +
          `${qty} × ${job.material} parts at <strong>$${unit}/each</strong> · total <strong>$${total} USDC</strong><br/>` +
          `Lead time: ${eta}<br/><br/>` +
          `<button onclick="lockEscrow(${total})" style="background:#0f1117;color:#fff;">🔒 Lock $${total} in MilestoneEscrow (Base Sepolia)</button>`);
      }, 900);
    }

    window.lockEscrow = function (amount) {
      bubble("agent", `Locking $${amount} USDC in MilestoneEscrow on Base Sepolia · funded from your CDP wallet · escrow released on milestone evidence + verifier ATTESTED…`);
      setTimeout(() => {
        const tx = "0x" + Math.random().toString(16).slice(2, 18) + "abc...";
        quote(`<strong>ESCROW LOCKED ✓</strong><br/>` +
          `Tx: <code>${tx}</code><br/>` +
          `State: Funded → Locked. Operator agent has accepted the job and will fire the first task on the a2a stream.<br/>` +
          `<a href="https://sepolia.basescan.org" target="_blank" style="color:#0f1117;text-decoration:underline;">View on Basescan</a>`);
      }, 1200);
    };

    // boot
    renderCaps();
    poll();
    setInterval(poll, 5000);
    bubble("agent", "Hi — I'm the operator agent for this enterprise. I'm online and accepting jobs. Tell me about what you need and I'll quote it against my live capabilities.");
    setTimeout(nextField, 600);
  </script>
</body>
</html>
